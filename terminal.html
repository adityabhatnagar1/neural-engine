      const COMMANDS = {

      function Prompt() {

      function Neofetch() {

          <div
            style={{
              display: "flex",
              flexWrap: "wrap",
              gap: "32px",

            <pre

            <div

              {SYSTEM_INFO.map((row, i) =>

                ) : (

                    key={i}
                    style={{

                      gap: "8px",

                      lineHeight: "1.6",
                    }}

                {[
                  TN.bgDark,

      function HistoryEntry({ entry }) {
        return (
          <div style={{ marginBottom: "14px" }}>
            <div
              style={{

              }}

              <Prompt />

            {entry.output &&
              entry.output.lines.map((line, i) => (
                <div
                  key={i}
                  style={{
                    paddingLeft: "22px",
                    fontSize: "12px",
                    lineHeight: "1.7",
                    color: line.color || TN.text,
                    fontWeight: line.bold ? 700 : 400,
                    minHeight: "6px",
                  }}
                >
                  {line.text}
                </div>
              ))}
            {entry.error && (
              <div
                style={{ paddingLeft: "22px", fontSize: "12px", color: TN.red }}
              >
                zsh: command not found: {entry.cmd}
              </div>
            )}
          </div>
        );
      }

      function Terminal() {
        const [history, setHistory] = useState([]);
        const [input, setInput] = useState("");
        const [cmdHistory, setCmdHistory] = useState([]);
        const [cmdIndex, setCmdIndex] = useState(-1);
        const [focused, setFocused] = useState(false);

        const inputRef = useRef(null);
        const bodyRef = useRef(null);

        useEffect(() => {
          if (bodyRef.current)
            bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
        }, [history]);

        const focusInput = useCallback(() => inputRef.current?.focus(), []);

        const runCommand = useCallback((raw) => {
          const cmd = raw.trim().toLowerCase();
          if (!cmd) return;
          setCmdHistory((prev) => [raw, ...prev]);
          setCmdIndex(-1);
          if (cmd === "clear") {
            setHistory([]);
            return;
          }
          const handler = COMMANDS[cmd];
          if (handler) {
            const output = handler();
            setHistory((prev) => [...prev, { cmd: raw, output }]);
          } else {
            setHistory((prev) => [...prev, { cmd: raw, error: true }]);
          }
        }, []);

        const handleKeyDown = useCallback(
          (e) => {
            if (e.key === "Enter") {
              runCommand(input);
              setInput("");
            } else if (e.key === "ArrowUp") {
              e.preventDefault();
              setCmdIndex((prev) => {
                const next = Math.min(prev + 1, cmdHistory.length - 1);
                setInput(cmdHistory[next] ?? "");
                return next;
              });
            } else if (e.key === "ArrowDown") {
              e.preventDefault();
              setCmdIndex((prev) => {
                const next = Math.max(prev - 1, -1);
                setInput(next === -1 ? "" : (cmdHistory[next] ?? ""));
                return next;
              });
            }
          },
          [input, runCommand, cmdHistory],
        );

        return (
          <>
            <style>{`
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
            * { box-sizing: border-box; }
            body { font-family: 'JetBrains Mono', monospace; }
            .t-scroll::-webkit-scrollbar { width: 4px; }
            .t-scroll::-webkit-scrollbar-track { background: transparent; }
            .t-scroll::-webkit-scrollbar-thumb { background: ${TN.borderHi}; border-radius: 2px; }
            .t-input {
              background: transparent; border: none; outline: none;
              color: ${TN.text}; font-family: 'JetBrains Mono', monospace;
              font-size: 13px; caret-color: ${TN.cyan}; width: 100%;
            }
            .t-chip {
              padding: 2px 8px; border-radius: 4px; background: ${TN.bgPanel};
              color: ${TN.textDim}; font-size: 11px; border: 1px solid ${TN.border};
              cursor: pointer; transition: border-color .15s, color .15s; user-select: none;
            }
            .t-chip:hover { border-color: ${TN.blue}; color: ${TN.blue}; }
            @keyframes blink { 0%,100%{opacity:.85} 50%{opacity:0} }
            .t-cursor {
              display: inline-block; width: 8px; height: 15px;
              background: ${TN.cyan}; vertical-align: middle; margin-left: 1px;
              animation: blink 1.1s step-end infinite; border-radius: 1px;
            }
          `}</style>

            <div
              onClick={focusInput}
              style={{
                width: "100%",
                height: "100%",
                background: TN.bg,
                display: "flex",
                flexDirection: "column",
                cursor: "text",
                fontFamily: "'JetBrains Mono', monospace",
              }}
            >
              {/* title bar */}
              <div
                style={{
                  height: "38px",

                  borderBottom: `1px solid ${TN.border}`,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  flexShrink: 0,
                  userSelect: "none",
                }}
              >
                <span
                  style={{
                    fontSize: "11px",
                    color: TN.textDim,
                    letterSpacing: "0.05em",
                  }}
                >
                  TERMINAL_v2.1X1
                </span>
              </div>

              {/* body */}
              <div
                ref={bodyRef}
                className="t-scroll"
                style={{
                  flex: 1,
                  overflowY: "auto",
                  padding: "20px 24px",
                  fontSize: "13px",
                  lineHeight: "1.6",
                  color: TN.text,

              >
                <Neofetch />
                <div
                  style={{
                    fontSize: "11px",
                    color: TN.textDim,
                    marginBottom: "20px",
                  }}
                >
                  type <span style={{ color: TN.cyan }}>help</span> to see
                  available commands
                </div>
                {history.map((entry, i) => (
                  <HistoryEntry key={i} entry={entry} />
                ))}
                <div
                  style={{ display: "flex", alignItems: "center", gap: "8px" }}
                >

                      flex: 1,
                      display: "flex",
                      alignItems: "center",

                      ref={inputRef}
                      className="t-input"
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={handleKeyDown}
                      onFocus={() => setFocused(true)}
                      onBlur={() => setFocused(false)}
                      autoComplete="off"
                      autoCorrect="off"
                      autoCapitalize="off"
                      spellCheck={false}
                    />
                    {focused && <span className="t-cursor" />}
                  </div>
                </div>
              </div>

              {/* status bar */}
              <div
                style={{
                  height: "24px",
                  background: TN.bgDark,
                  borderTop: `1px solid ${TN.border}`,
                  display: "flex",
                  alignItems: "center",
                  padding: "0 16px",
                  flexShrink: 0,
                  gap: "12px",
                }}
              >
                <span
                  style={{
                    fontSize: "10px",
                    color: TN.bgDark,
                    background: TN.blue,
                    borderRadius: "3px",
                    padding: "1px 7px",
                    fontWeight: 700,
                  }}

                  NORMAL
                </span>
                <div
                  style={{
                    display: "flex",
                    gap: "6px",
                    flex: 1,
                    overflowX: "auto",
                  }}
                >
                  {["help", "about", "skills", "projects"].map((cmd) => (
                    <span
                      key={cmd}
                      className="t-chip"
                      onClick={(e) => {
                        e.stopPropagation();
                        runCommand(cmd);
                        setInput("");
                      }}
                    >
                      {cmd}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </>
